services:
  postgres:
    image: postgres:16
    container_name: singlevendor_postgres
    restart: always
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - singlevendor_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: singlevendor_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - singlevendor_network

  thumbnail-worker:
    build: ../thumbnail-worker
    container_name: thumbnail_worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FILE_DIRECTORY=/home/carlostr/Documents/singlevendorappfiles
    volumes:
      - /home/carlostr/Documents/singlevendorappfiles:/home/carlostr/Documents/singlevendorappfiles
    depends_on:
      - redis

volumes:
  postgres_data:

networks:
  singlevendor_network:
    driver: bridge
